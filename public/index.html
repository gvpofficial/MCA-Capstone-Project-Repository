<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Java OOP Chat App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="chat-app">
    <header>
      <h1>Java OOP Chat Application</h1>
      <p>Simple MCA project using Java + HTML/CSS</p>
    </header>

    <section id="messages" class="messages"></section>

    <form id="chatForm" class="chat-form">
      <input id="nameInput" type="text" maxlength="20" placeholder="Your name" required />
      <textarea id="messageInput" maxlength="250" placeholder="Type your message..." required></textarea>
      <button type="submit">Send</button>
    </form>
  </main>

  <script src="app.js"></script>
</body>
</html>
